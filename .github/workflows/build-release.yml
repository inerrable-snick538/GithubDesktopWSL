name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 3.5.6)'
        required: true
        type: string
      upstream_tag:
        description: 'Upstream tag (e.g. release-3.5.6)'
        required: true
        type: string

permissions:
  contents: write
  issues: write

env:
  NODE_VERSION: '22'

jobs:
  build-daemon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout github-desktop-wsl
        uses: actions/checkout@v6

      - name: Build daemon
        run: |
          cd wsl-daemon
          make

      - name: Upload daemon binary
        uses: actions/upload-artifact@v7
        with:
          name: wsl-git-daemon
          path: wsl-daemon/wsl-git-daemon

  build-windows:
    needs: build-daemon
    runs-on: windows-2022
    steps:
      - name: Checkout github-desktop-wsl (for patches + daemon source)
        uses: actions/checkout@v6
        with:
          path: wsl-repo

      - name: Clone upstream desktop/desktop at release tag
        run: |
          git clone --depth 1 --branch ${{ inputs.upstream_tag }} https://github.com/desktop/desktop.git desktop
        shell: bash

      - name: Apply WSL patches
        id: apply
        run: |
          cd desktop
          for patch in ../wsl-repo/patches/*.patch; do
            echo "Applying $(basename $patch)..."
            git apply --verbose "$patch" || {
              echo "::error::Failed to apply $(basename $patch)"
              echo "failed=true" >> "$GITHUB_OUTPUT"
              echo "failed_patch=$(basename $patch)" >> "$GITHUB_OUTPUT"
              exit 1
            }
          done
          echo "All patches applied successfully"
        shell: bash

      - name: Copy daemon source into upstream tree
        run: |
          cp -r wsl-repo/wsl-daemon desktop/wsl-daemon
        shell: bash

      - name: Download daemon binary
        uses: actions/download-artifact@v8
        with:
          name: wsl-git-daemon
          path: desktop/wsl-daemon

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'desktop/.node-version'
          cache: 'yarn'
          cache-dependency-path: 'desktop/yarn.lock'

      - name: Install dependencies
        run: |
          cd desktop
          yarn install --frozen-lockfile --ignore-engines

      - name: Build production
        run: |
          cd desktop
          yarn build:prod
        env:
          RELEASE_CHANNEL: production
          NODE_ENV: production

      - name: Verify daemon bundled
        shell: pwsh
        run: |
          if (Test-Path "desktop\out\wsl-git-daemon") {
            Write-Host "wsl-git-daemon found in out/"
          } else {
            Write-Error "wsl-git-daemon NOT found in out/ - build.ts did not copy it"
            exit 1
          }

      - name: Package Windows installer
        run: |
          cd desktop
          yarn package
        env:
          RELEASE_CHANNEL: production
          SKIP_CODE_SIGNING: '1'

      - name: List artifacts
        shell: pwsh
        run: |
          Get-ChildItem desktop\dist\ -Recurse -Include *.exe,*.nupkg,RELEASES | Format-Table Name, Length

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: |
            desktop/dist/*Setup*.exe
            desktop/dist/*.nupkg
            desktop/dist/RELEASES

  release:
    needs: [build-daemon, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download daemon
        uses: actions/download-artifact@v8
        with:
          name: wsl-git-daemon
          path: artifacts

      - name: Download installer
        uses: actions/download-artifact@v8
        with:
          name: windows-installer
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wsl-${{ inputs.version }}
          name: GitHub Desktop WSL v${{ inputs.version }}
          body: |
            GitHub Desktop WSL — based on upstream release `release-${{ inputs.version }}`.

            ## Changes from upstream
            - WSL repository support via persistent daemon
            - Native SSH key access from WSL
            - File operations routed through WSL daemon (no 9P overhead)
            - Auto-updates from this repository

            ## Install
            Download `GitHubDesktopWSLSetup-x64.exe` and run it. That's it — the daemon is bundled and starts automatically when you open a WSL repo.

            Windows SmartScreen may warn on first install — click "More info" → "Run anyway".
          files: |
            artifacts/*
          draft: false
          prerelease: false

  report-failure:
    needs: build-windows
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create issue for patch failure
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Patch failure on upstream ${{ inputs.upstream_tag }}`,
              body: `The build workflow failed while applying patches onto \`${{ inputs.upstream_tag }}\`.\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nThis likely means upstream changed a file that one of our patches targets. The patch needs to be regenerated.`,
              labels: ['patch-conflict']
            });
