name: Sync Upstream & Build

on:
  schedule:
    - cron: '0 */6 * * *' # check every 6 hours
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      version: ${{ steps.upstream.outputs.version }}
      tag: ${{ steps.upstream.outputs.tag }}
    steps:
      - name: Checkout github-desktop-wsl
        uses: actions/checkout@v6

      - name: Get latest upstream release tag
        id: upstream
        run: |
          LATEST=$(git ls-remote --tags https://github.com/desktop/desktop.git 'refs/tags/release-*' \
            | awk '{print $2}' \
            | sed 's|refs/tags/||' \
            | grep -v -E '(beta|test)' \
            | sort -V \
            | tail -1)
          VERSION=$(echo "$LATEST" | sed 's/^release-//')
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest upstream release: $LATEST"

      - name: Check if we already have this version
        id: check
        run: |
          if gh release view "wsl-${{ steps.upstream.outputs.version }}" --repo "${{ github.repository }}" &>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already released wsl-${{ steps.upstream.outputs.version }}"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New upstream release: ${{ steps.upstream.outputs.tag }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger build
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-release.yml',
              ref: 'main',
              inputs: {
                version: '${{ steps.upstream.outputs.version }}',
                upstream_tag: '${{ steps.upstream.outputs.tag }}'
              }
            });
